[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "betterdb-retrieval"
version = "0.4.1"
description = "Developer-facing retrieval SDK over Valkey Search: index lifecycle, upsert, and vector + filtered query."
keywords = ["valkey", "redis", "valkey-search", "vector-search", "retrieval", "rag", "embeddings", "knn"]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.11"
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "betterdb-valkey-search-kit>=0.1.0",
    "prometheus-client>=0.19.0",
    "posthog>=3.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]
# Optional extras for the LongMemEval harness (eval/longmemeval). The offline
# Tier 0 path (mock store + hashed embedder) needs nothing here; OpenAI calls use
# the stdlib. ``eval`` only adds the valkey client for the real-store tier.
eval = [
    "valkey>=6.0.0",
]

[project.urls]
Repository = "https://github.com/BetterDB-inc/monitor"

[tool.uv.sources]
betterdb-valkey-search-kit = { path = "../valkey-search-kit-py", editable = true }

[tool.hatch.build.targets.wheel]
packages = ["betterdb_retrieval"]

[tool.hatch.build.hooks.custom]
path = "hatch_build.py"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py311"
line-length = 100
