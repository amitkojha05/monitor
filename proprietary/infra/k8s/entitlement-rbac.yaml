apiVersion: v1
kind: ServiceAccount
metadata:
  name: entitlement
  namespace: system
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::811740411689:role/betterdb-entitlement
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: entitlement-provisioner
rules:
  # Namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]
  # Pod/Service/Secret/PVC management in tenant namespaces
  # PVCs: valkey-search uses a StatefulSet volumeClaimTemplate; the PVCs are
  # left behind on delete, so the provisioner cleans them up explicitly.
  - apiGroups: [""]
    resources: ["pods", "services", "secrets", "resourcequotas", "persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Pod logs (for schema job debugging)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Deployment + StatefulSet management (StatefulSet backs valkey-search)
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Scale subresource: deprovision scales the tenant app to zero to free the
  # namespace ResourceQuota before running the schema-drop Job.
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "update", "patch"]
  # Traefik IngressRouteTCP for public Valkey exposure (SNI routing)
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutetcps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Job management (schema init/drop)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]
  # Ingress management
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "create", "delete"]
  # NetworkPolicy management (tenant isolation)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: entitlement-provisioner
subjects:
  - kind: ServiceAccount
    name: entitlement
    namespace: system
roleRef:
  kind: ClusterRole
  name: entitlement-provisioner
  apiGroup: rbac.authorization.k8s.io
